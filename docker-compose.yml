services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pharmastock
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/pharmastock
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '4000:4000'
    restart: on-failure

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:4000
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  pgdata:
